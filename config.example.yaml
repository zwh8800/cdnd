# cdnd 配置文件
# 这是一个 cdnd 示例配置文件。
# 将此文件复制到 ~/.cdnd/config.yaml 或运行 `cdnd config init` 来创建一个。

# LLM（大语言模型）设置
llm:
  # 默认使用的 LLM 提供者
  default_provider: openai

  # LLM 提供者配置
  providers:
    # OpenAI 提供者
    openai:
      # 你的 OpenAI API 密钥（留空则使用 OPENAI_API_KEY 环境变量）
      api_key: ""
      # 使用的模型
      model: "qwen3.5-plus"
      # API 基础 URL
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      # 每次响应的最大 token 数
      max_tokens: 65536
      # 响应生成的温度（0.0 - 1.0）
      temperature: 1.0

    # Anthropic 提供者
    anthropic:
      api_key: ""
      model: "claude-3-opus-20240229"
      max_tokens: 4096
      temperature: 0.7

    # Ollama 提供者（本地模型）
    ollama:
      # 本地 Ollama 不需要 API 密钥
      model: "llama2"
      base_url: "http://localhost:11434"
      max_tokens: 4096
      temperature: 0.7

# 游戏设置
game:
  # 启用自动保存
  autosave: true
  # 自动保存间隔（例如：5m, 10m, 1h）
  autosave_interval: 5m
  # 在内存中保留的最大历史回合数
  max_history_turns: 100
  # 游戏内容的语言（zh-CN, en-US 等）
  language: "zh-CN"

# 显示设置
display:
  # 启用文本打字机效果
  typewriter_effect: true
  # 打字机效果的打字速度（例如：30ms, 50ms, 100ms）
  typing_speed: 50ms
  # 启用彩色输出
  color_output: true
  # 显示 token 使用信息
  show_tokens: false

# 高级设置
advanced:
  # 启用响应缓存
  cache_enabled: true
  # 缓存生存时间（例如：1h, 24h, 7d）
  cache_ttl: 24h
  # 日志级别（debug, info, warn, error）
  log_level: "info"
  # 日志文件路径（留空则仅输出到控制台）
  log_file: ""
